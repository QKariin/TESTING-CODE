<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
@font-face {
    font-family: 'Cinzel';
    src: url('/fonts/Cinzel-Regular.woff2') format('woff2');
    font-weight: 400;
    font-display: swap;
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
html, body { background: transparent; overflow: hidden; height: 100%; }

/* FAQ CHAT OVERLAY */
.faq-chat-overlay {
    position: fixed; top: 0; left: 0; right: 0;
    bottom: calc(60px + env(safe-area-inset-bottom));
    z-index: 99999; background: #020512;
    display: flex; flex-direction: column;
    transform: translateY(100%);
    visibility: hidden;
    transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1), visibility 0.35s;
}
.faq-chat-overlay.open { transform: translateY(0); visibility: visible; }
.faq-chat-header {
    flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
    padding: calc(env(safe-area-inset-top) + 20px) 20px 20px;
    border-bottom: 1px solid rgba(197,160,89,0.25);
    border-top: 3px solid rgba(197,160,89,0.55);
    background: #020512; z-index: 2;
}
.faq-chat-header-left { display: flex; align-items: center; gap: 10px; }
.faq-chat-header-av-wrap { position: relative; width: 52px; height: 52px; }
.faq-chat-header-av {
    width: 52px; height: 52px; border-radius: 50%; object-fit: cover;
    border: 1.5px solid rgba(197,160,89,0.5);
}
.faq-chat-online-dot {
    position: absolute; bottom: 1px; right: 1px; width: 10px; height: 10px;
    background: #4ade80; border-radius: 50%; border: 2px solid #020512;
    box-shadow: 0 0 6px #4ade80, 0 0 12px rgba(74,222,128,0.4);
    animation: neonPulse 2s ease-in-out infinite;
}
.faq-chat-header-info { display: flex; flex-direction: column; }
.faq-chat-header-name {
    font-family: 'Cinzel', serif; font-size: 0.85rem;
    color: #c5a059; letter-spacing: 3px; font-weight: bold; line-height: 1;
}
.faq-chat-header-status {
    font-family: 'Orbitron', sans-serif; font-size: 0.28rem;
    color: #4ade80; letter-spacing: 2px; margin-top: 4px;
    display: flex; align-items: center; gap: 4px;
}
.faq-chat-header-status::before {
    display: none;
}
.faq-chat-close {
    background: none; border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.4); width: 32px; height: 32px;
    border-radius: 50%; font-size: 0.8rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
}
.faq-chat-body {
    flex: 1; overflow-y: auto; padding: 20px 12px;
    display: flex; flex-direction: column; gap: 6px;
    -webkit-overflow-scrolling: touch;
}
.faq-chat-body::-webkit-scrollbar { display: none; }
.faq-cb-row { display: flex; align-items: flex-end; gap: 6px; padding: 0 4px;
    animation: faqSlideUp 0.4s cubic-bezier(0.16,1,0.3,1) forwards;
}
.faq-cb-row-queen { justify-content: flex-start; }
.faq-cb-row-user { justify-content: flex-end; }
.faq-cb-av-wrap {
    position: relative; width: 38px; height: 38px; flex-shrink: 0;
    align-self: flex-end; margin-bottom: 20px;
}
.faq-cb-av {
    width: 38px; height: 38px; border-radius: 50%; object-fit: cover;
    border: 1.5px solid rgba(197,160,89,0.35);
}
.faq-cb-dot {
    position: absolute; bottom: 0; right: 0; width: 8px; height: 8px;
    background: #4ade80; border-radius: 50%; border: 1.5px solid #020512;
    box-shadow: 0 0 6px #4ade80, 0 0 12px rgba(74,222,128,0.4);
    animation: neonPulse 2s ease-in-out infinite;
}
@keyframes neonPulse {
    0%, 100% { box-shadow: 0 0 6px #4ade80, 0 0 12px rgba(74,222,128,0.4); }
    50% { box-shadow: 0 0 10px #4ade80, 0 0 20px rgba(74,222,128,0.6), 0 0 30px rgba(74,222,128,0.2); }
}
.faq-cb-wrap-queen { display: flex; flex-direction: column; align-items: flex-start; max-width: 80%; }
.faq-cb-wrap-user { display: flex; flex-direction: column; align-items: flex-end; max-width: 80%; }
.faq-cb-queen {
    background: #000; border: 1px solid rgba(255,0,199,0.3);
    color: #fff; font-family: 'Cinzel', serif; font-size: 1.05rem; line-height: 1.55;
    letter-spacing: 0.2px; padding: 12px 16px; border-radius: 16px 16px 16px 3px;
    word-break: break-word; white-space: pre-wrap;
}
.faq-cb-user {
    background: #1c1c1e; color: #fff; font-family: 'Cinzel', serif;
    font-size: 1.05rem; line-height: 1.55; letter-spacing: 0.2px;
    padding: 12px 16px; border-radius: 16px 16px 3px 16px;
    word-break: break-word; cursor: pointer; transition: background 0.2s;
}
.faq-cb-user:active { background: #2a2a2e; }
.faq-cat-chips {
    display: flex; flex-direction: column; align-items: center;
    gap: 0; padding: 4px 0;
}
.faq-cat-chip {
    background: linear-gradient(135deg,rgba(255,0,199,0.15),rgba(0,0,0,0.3)); border: 1px solid rgba(255,0,199,0.3);
    color: #ff00c7; font-family: 'Cinzel', serif;
    font-size: 0.95rem; padding: 16px 24px; border-radius: 20px; width: 80%; box-sizing: border-box; text-align: center;
    cursor: pointer; transition: all 0.2s; letter-spacing: 1px;
    opacity: 0; animation: faqQFadeIn 0.5s cubic-bezier(0.16,1,0.3,1) forwards;
}
.faq-cat-chip:active { background: rgba(255,0,199,0.25); border-color: rgba(255,0,199,0.5); }
.faq-q-wrap {
    display: flex; flex-direction: column; align-items: center;
    gap: 0; padding: 4px 0;
}
.faq-q-bubble {
    background: #1c1c1e; border: 1px solid rgba(197,160,89,0.1);
    color: rgba(255,255,255,0.7); font-family: 'Cinzel', serif;
    font-size: 0.85rem; line-height: 1.5; padding: 14px 24px;
    border-radius: 20px; cursor: pointer; transition: all 0.2s;
    text-align: center; width: 80%; box-sizing: border-box;
    opacity: 0; animation: faqQFadeIn 0.5s cubic-bezier(0.16,1,0.3,1) forwards;
}
.faq-q-bubble:active { background: rgba(197,160,89,0.1); border-color: rgba(197,160,89,0.3); }
.faq-a-bubble {
    background: #000; border: 1px solid rgba(255,0,199,0.3);
    color: rgba(255,255,255,0.92); font-family: 'Cinzel', serif;
    font-size: 1.05rem; line-height: 1.8; padding: 12px 14px;
    border-radius: 16px 16px 16px 3px; word-break: break-word;
    text-align: left;
    animation: faqBubbleIn 0.45s cubic-bezier(0.16,1,0.3,1) forwards;
}
.faq-typing-row { display: flex; align-items: flex-end; gap: 6px; padding: 0 4px;
    animation: faqSlideUp 0.4s cubic-bezier(0.16,1,0.3,1) forwards;
}
.faq-typing-bubble {
    background: #000; border: 1px solid rgba(255,0,199,0.3);
    padding: 12px 18px; border-radius: 16px 16px 16px 3px;
    display: flex; gap: 5px; align-items: center;
    animation: faqBubbleIn 0.35s cubic-bezier(0.16,1,0.3,1) forwards;
}
.faq-typing-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(197,160,89,0.5);
    animation: faqTypingBounce 1.2s ease-in-out infinite;
}
.faq-typing-dot:nth-child(2) { animation-delay: 0.15s; }
.faq-typing-dot:nth-child(3) { animation-delay: 0.3s; }
.faq-chat-ts {
    font-family: 'Orbitron', sans-serif; font-size: 0.3rem;
    letter-spacing: 1px; margin-top: 3px; color: rgba(255,255,255,0.15);
}
.faq-chat-ts-queen { color: rgba(197,160,89,0.35); text-align: left; }
.faq-chat-ts-user { text-align: right; }
.faq-chat-actions {
    display: flex; flex-direction: column; align-items: center;
    gap: 8px; margin-top: 16px; padding-bottom: 20px;
    animation: faqFadeIn 0.4s ease forwards;
}
.faq-close-btn {
    background: none; border: 1px solid rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.25); font-family: 'Cinzel', serif;
    font-size: 0.6rem; letter-spacing: 2px; padding: 12px 28px;
    border-radius: 14px; cursor: pointer;
}
.faq-keep-asking-wrap {
    display: flex; flex-direction: column; align-items: center;
    gap: 10px; margin-top: 18px;
    position: relative; z-index: 2;
    animation: faqFadeIn 0.5s ease forwards;
}
.faq-change-topic-btn {
    background: transparent; border-color: rgba(197,160,89,0.15);
    color: rgba(197,160,89,0.5);
}
.faq-keep-asking-btn {
    background: rgba(197,160,89,0.08); border: 1px solid rgba(197,160,89,0.3);
    color: #c5a059; font-family: 'Cinzel', serif;
    font-size: 0.7rem; letter-spacing: 3px; padding: 14px 32px;
    cursor: pointer; transition: all 0.3s;
    text-transform: uppercase;
    -webkit-tap-highlight-color: transparent;
}
.faq-keep-asking-btn:hover {
    background: rgba(197,160,89,0.15); border-color: rgba(197,160,89,0.55);
}

@keyframes faqBubbleIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes faqSlideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes faqTypingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
}
@keyframes faqQFadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes faqFadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* FOOTER NAV */
.fake-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 9999999;
    height: calc(60px + env(safe-area-inset-bottom));
    padding-bottom: env(safe-area-inset-bottom);
    background: rgba(4, 4, 12, 0.96);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid rgba(197, 160, 89, 0.18);
    display: flex; align-items: stretch; justify-content: space-around;
}
.fake-nav-btn {
    flex: 1; background: transparent; border: none;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 5px; cursor: pointer; padding: 0;
    -webkit-tap-highlight-color: transparent;
}
.fake-nav-icon { font-size: 1.6rem; color: rgba(197, 160, 89, 0.35); line-height: 1; }
.fake-nav-label { font-family: 'Cinzel', serif; font-size: 0.55rem; color: rgba(197, 160, 89, 0.35); letter-spacing: 1.5px; text-transform: uppercase; }
.fake-nav-center {
    flex: 1; background: transparent; border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; padding: 0; position: relative;
    margin-top: -30px; transform: translateY(14px);
    -webkit-tap-highlight-color: transparent;
}
.fake-nav-avatar {
    width: 75px; height: 75px; border-radius: 50%;
    overflow: hidden; background: #000; flex-shrink: 0;
}
.fake-nav-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

/* MESSAGE BADGE on avatar */
.msg-badge {
    position: absolute; top: -2px; right: -4px; width: 22px; height: 18px;
    display: none; z-index: 2;
    filter: drop-shadow(0 0 4px rgba(197,160,89,0.9));
    animation: msgBadgePop 1.8s ease-in-out infinite;
}
.msg-badge.active { display: block; }
@keyframes msgBadgePop {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
}

/* NOTIFICATION BAR */
.msg-notif {
    position: fixed; bottom: calc(70px + env(safe-area-inset-bottom));
    left: 50%; transform: translateX(-50%); width: 85%; max-width: 380px;
    background: rgba(10,10,20,0.95); border: 1px solid rgba(197,160,89,0.35);
    border-radius: 16px; padding: 14px 16px;
    display: none; z-index: 9999998;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    animation: notifSlideUp 0.4s ease-out forwards;
    cursor: pointer;
}
.msg-notif.active { display: block; }
.msg-notif-inner { display: flex; align-items: center; gap: 12px; }
.msg-notif-av {
    width: 40px; height: 40px; border-radius: 50%; object-fit: cover;
    border: 1.5px solid rgba(197,160,89,0.5); flex-shrink: 0;
}
.msg-notif-text { flex: 1; min-width: 0; }
.msg-notif-from {
    font-family: 'Cinzel', serif; font-size: 0.7rem; color: #c5a059;
    letter-spacing: 1px; font-weight: 600;
}
.msg-notif-preview {
    font-family: 'Cinzel', serif; font-size: 0.65rem; color: rgba(255,255,255,0.4);
    margin-top: 2px;
}
.msg-notif-actions { display: flex; gap: 8px; margin-top: 10px; }
.msg-notif-btn {
    flex: 1; padding: 8px 0; border-radius: 8px; font-family: 'Cinzel', serif;
    font-size: 0.45rem; letter-spacing: 2px; cursor: pointer; text-align: center;
}
.msg-notif-dismiss {
    background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.4);
    border: 1px solid rgba(255,255,255,0.08);
}
.msg-notif-open {
    background: linear-gradient(135deg, #c5a059 0%, #8a6d30 100%);
    color: #020202; border: none; font-weight: 700;
}
@keyframes notifSlideUp {
    from { opacity: 0; transform: translateX(-50%) translateY(20px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

/* GLOBAL OVERLAY */
.global-overlay {
    position: fixed; top: 0; left: 0; right: 0;
    bottom: calc(60px + env(safe-area-inset-bottom));
    z-index: 99999; background: #020512;
    display: flex; flex-direction: column;
    transform: translateY(100%);
    visibility: hidden;
    transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1), visibility 0.35s;
}
.global-overlay.open { transform: translateY(0); visibility: visible; }
.global-header {
    flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;
    padding: calc(env(safe-area-inset-top) + 16px) 20px 16px;
    border-bottom: 1px solid rgba(197,160,89,0.15);
    border-top: 3px solid rgba(197,160,89,0.55);
    background: #020512; z-index: 2;
}
.global-header-title {
    font-family: 'Cinzel', serif; font-size: 0.7rem;
    color: rgba(197,160,89,0.6); letter-spacing: 4px; font-weight: 600;
}
.global-close {
    background: none; border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.4); width: 32px; height: 32px;
    border-radius: 50%; font-size: 0.8rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
}
.global-body {
    flex: 1; overflow-y: auto; padding: 0;
    -webkit-overflow-scrolling: touch;
}
.global-body::-webkit-scrollbar { display: none; }

/* Leaderboard inside global */
.gl-section-label {
    display: flex; align-items: center; gap: 14px; padding: 20px 16px 12px;
}
.gl-section-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, rgba(197,160,89,0.12)); }
.gl-section-line-r { background: linear-gradient(90deg, rgba(197,160,89,0.12), transparent); }
.gl-section-text {
    font-family: 'Orbitron', sans-serif; font-size: 0.4rem; font-weight: 500;
    color: rgba(197,160,89,0.3); letter-spacing: 5px;
}
.gl-lb-tabs {
    display: flex; justify-content: center; gap: 0; padding: 0 16px 12px;
}
.gl-lb-tab {
    background: none; border: none; padding: 8px 18px;
    font-family: 'Cinzel', serif; font-size: 0.5rem; font-weight: 400;
    letter-spacing: 3px; text-transform: uppercase; cursor: pointer;
    color: rgba(255,255,255,0.15); border-bottom: 1px solid transparent;
    transition: all 0.3s;
}
.gl-lb-tab.active { color: #c5a059; border-bottom-color: rgba(197,160,89,0.4); }
.gl-lb-entry {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 16px; border-left: 2px solid transparent;
    transition: all 0.3s; animation: faqFadeIn 0.4s ease forwards;
}
.gl-lb-entry.top1 { background: rgba(197,160,89,0.06); border-left-color: rgba(197,160,89,0.35); }
.gl-lb-entry.top2, .gl-lb-entry.top3 { border-left-color: rgba(197,160,89,0.2); }
.gl-lb-rank {
    font-family: 'Cinzel', serif; font-weight: 700; width: 30px;
    text-align: center; flex-shrink: 0;
}
.gl-lb-entry.top1 .gl-lb-rank { font-size: 1.3rem; color: #c5a059; }
.gl-lb-entry:not(.top1) .gl-lb-rank { font-size: 1rem; color: rgba(255,255,255,0.18); }
.gl-lb-entry.top2 .gl-lb-rank, .gl-lb-entry.top3 .gl-lb-rank { color: rgba(197,160,89,0.5); }
.gl-lb-avatar {
    width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
    background: linear-gradient(135deg, rgba(197,160,89,0.12), rgba(197,160,89,0.04));
    border: 1px solid rgba(197,160,89,0.15);
    background-size: cover; background-position: center;
}
.gl-lb-info { flex: 1; min-width: 0; text-align: left; }
.gl-lb-name {
    font-family: 'Cinzel', serif; font-size: 0.92rem; font-weight: 600;
    color: rgba(255,255,255,0.55); overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
}
.gl-lb-entry.top1 .gl-lb-name { color: rgba(255,255,255,0.85); }
.gl-lb-hier {
    font-family: 'Cinzel', serif; font-size: 0.6rem; font-weight: 400;
    color: rgba(197,160,89,0.35); letter-spacing: 1.5px;
}
.gl-lb-score { font-family: 'Cinzel', serif; font-size: 1rem; font-weight: 700; flex-shrink: 0; }
.gl-lb-entry.top1 .gl-lb-score { color: #c5a059; }
.gl-lb-entry:not(.top1) .gl-lb-score { color: rgba(197,160,89,0.5); }
.gl-lb-entry.minor { padding: 10px 15px; border-left-color: transparent; }
.gl-lb-entry.minor .gl-lb-rank { font-size: 0.75rem; color: rgba(255,255,255,0.1); }
.gl-lb-entry.minor .gl-lb-avatar { width: 30px; height: 30px; opacity: 0.5; }
.gl-lb-entry.minor .gl-lb-name { font-size: 0.7rem; color: rgba(255,255,255,0.25); }
.gl-lb-entry.minor .gl-lb-hier { font-size: 0.45rem; color: rgba(197,160,89,0.15); }
.gl-lb-entry.minor .gl-lb-score { font-size: 0.75rem; color: rgba(197,160,89,0.25); }

/* Activity feed cards */
.gl-activity-card {
    position: relative;
    background: rgba(15,15,18,0.7); border: 1px solid rgba(197,160,89,0.12);
    border-radius: 12px; margin: 0 12px 10px; overflow: hidden;
    animation: faqFadeIn 0.4s ease forwards;
}
.gl-activity-card-std {
    padding: 14px 16px;
}
.gl-activity-card-std .gl-ac-row {
    display: flex; align-items: center; gap: 12px;
}
.gl-ac-av {
    width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
    border: 1.5px solid rgba(197,160,89,0.5); object-fit: cover;
}
.gl-ac-av-fallback {
    width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
    border: 1.5px solid rgba(197,160,89,0.35);
    background: linear-gradient(135deg, rgba(197,160,89,0.15), rgba(197,160,89,0.05));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif; font-size: 0.9rem; color: rgba(197,160,89,0.6); font-weight: 600;
}
.gl-ac-info { flex: 1; min-width: 0; }
.gl-ac-name {
    font-family: 'Cinzel', serif; font-size: 0.85rem; font-weight: 600;
    color: #c5a059; letter-spacing: 1px; line-height: 1.2;
}
.gl-ac-hier {
    font-family: 'Orbitron', sans-serif; font-size: 0.35rem;
    color: rgba(197,160,89,0.4); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px;
}
.gl-ac-text {
    font-family: 'Cinzel', serif; font-size: 0.72rem;
    color: rgba(255,255,255,0.55); margin-top: 6px; line-height: 1.4;
}
.gl-ac-time {
    position: absolute; top: 10px; right: 12px;
    font-family: 'Orbitron', sans-serif; font-size: 0.4rem;
    color: rgba(197,160,89,0.45); letter-spacing: 1px;
}
/* Risky card layout */
.gl-activity-card-risky {
    display: flex; min-height: 120px;
}
.gl-ac-risky-left {
    flex: 0 0 28%; display: flex; flex-direction: column; align-items: center;
    justify-content: center; background: rgba(197,160,89,0.04);
    border-right: 1px solid rgba(197,160,89,0.12); padding: 14px 10px; gap: 6px;
}
.gl-ac-risky-left img { width: 60%; max-width: 55px; height: auto; opacity: 0.9; }
.gl-ac-risky-left span {
    font-family: 'Orbitron', sans-serif; font-size: 0.38rem;
    color: rgba(197,160,89,0.45); letter-spacing: 2px; text-transform: uppercase; text-align: center; line-height: 1.3;
}
.gl-ac-risky-right {
    flex: 1; padding: 12px 14px; display: flex; flex-direction: column; justify-content: center; gap: 4px;
}
.gl-empty {
    text-align: center; padding: 30px 0;

function scrollFaqChat() {

    if (!body) return;
    setTimeout(function() { body.scrollTo({ top: body.scrollHeight, behavior: 'smooth' }); }, 50);
}

}

function removeTypingIndicator() {
    var el = document.getElementById('faqTyping');

}

    var delay = 0;

                var wrap = document.createElement('div');
                wrap.className = 'faq-cat-chips';
                var chip = document.createElement('button');
                chip.className = 'faq-cat-chip';

                chip.onclick = function() { selectCategory(parseInt(this.getAttribute('data-cat'))); };

                body.appendChild(wrap);
                scrollFaqChat();
            }, d * 350);
        })(i, delay);
        delay++;

            }, 400);
        } else {
            // All questions in this category asked — show other categories
            setTimeout(function() {
                showTypingIndicator();
                setTimeout(function() {
                    addQueenBubble('You\'ve covered everything here. Want to explore another topic?');
                    setTimeout(function() { showCategoryChips(catIndex); setTimeout(function() { addChatActions(); scrollFaqChat(); }, faqData.length * 350 + 200); }, 400);
                }, 900);
            }, 400);
        }
        scrollFaqChat();
    }, 1500);
}

function goBackToCategories() {
    showTypingIndicator();
    setTimeout(function() {
        addQueenBubble('What else would you like to know?');
        setTimeout(function() {
            showCategoryChips();
            setTimeout(function() { addChatActions(); scrollFaqChat(); }, faqData.length * 350 + 200);
        }, 400);
    }, 1000);
}

/* ── OPEN / CLOSE / TOGGLE ── */
function openFaqChat() {
    // Close global if open
    var gl = document.getElementById('globalOverlay');
    if (gl && gl.classList.contains('open')) gl.classList.remove('open');
    var overlay = document.getElementById('faqChatOverlay');
    var body = document.getElementById('faqChatBody');
    if (!overlay || !body) return;
    body.innerHTML = '';
    // Tell parent FAQ opened (for fomo toast timing)
    parent.postMessage({ type: 'faqOpened' }, '*');
    // Tell parent to expand iframe
    parent.postMessage({ type: 'faqOpen' }, '*');
    // Wait for iframe resize, then animate
    setTimeout(function() {
        overlay.classList.add('open');
        setTimeout(function() { showTypingIndicator(); }, 200);
        setTimeout(function() { addQueenBubble('Welcome to my Kinkdom. I have answered some of the most asked questions for you.'); }, 1200);
        setTimeout(function() {
            showCategoryChips();
            setTimeout(function() { addChatActions(); scrollFaqChat(); }, faqData.length * 350 + 200);
        }, 1600);
    }, 60);
}

function closeFaqChat() {
    var overlay = document.getElementById('faqChatOverlay');
    if (!overlay) return;
    overlay.classList.remove('open');
    // Tell parent to shrink iframe after animation
    parent.postMessage({ type: 'faqClose' }, '*');
}

function toggleFaqChat() {
    var overlay = document.getElementById('faqChatOverlay');
    if (!overlay) return;
    if (overlay.classList.contains('open')) { closeFaqChat(); return; }
    openFaqChat();
}

/* ── NAV CLICK HANDLERS ── */
function handleNavClick(section) {
    // HOME just closes everything
    if (section === 'Home') {
        var faq = document.getElementById('faqChatOverlay');
        if (faq && faq.classList.contains('open')) closeFaqChat();
        var gl = document.getElementById('globalOverlay');
        if (gl && gl.classList.contains('open')) closeGlobal();
        parent.postMessage({ type: 'dismissAccessDenied' }, '*');
        return;
    }
    // Close FAQ if open
    var faq = document.getElementById('faqChatOverlay');
    if (faq && faq.classList.contains('open')) closeFaqChat();
    // Close global if open
    var gl = document.getElementById('globalOverlay');
    if (gl && gl.classList.contains('open')) closeGlobal();
    // Tell parent to show access denied
    parent.postMessage({ type: 'navClick', section: section }, '*');
}

function handleCenterClick() {
    // Dismiss access denied in parent
    parent.postMessage({ type: 'dismissAccessDenied' }, '*');
    // Close global if open
    var gl = document.getElementById('globalOverlay');
    if (gl && gl.classList.contains('open')) { closeGlobal(); return; }
    // Hide notification if visible
    dismissNotif();
    // Toggle FAQ
    toggleFaqChat();
}

/* ── FAKE MESSAGE NOTIFICATION ── */
var notifTimer = null;
var notifShown = false;

function showNotif() {
    if (notifShown) return;
    // Don't show if FAQ or Global is already open
    var faq = document.getElementById('faqChatOverlay');
    var gl = document.getElementById('globalOverlay');
    if ((faq && faq.classList.contains('open')) || (gl && gl.classList.contains('open'))) return;
    notifShown = true;
    var badge = document.getElementById('msgBadge');
    if (badge) badge.classList.add('active');
    // Tell parent to expand iframe FIRST, then show notification after resize
    parent.postMessage({ type: 'notifShow' }, '*');
    setTimeout(function() {
        var notif = document.getElementById('msgNotif');
        if (notif) notif.classList.add('active');
    }, 120);
}

function dismissNotif() {
    var badge = document.getElementById('msgBadge');
    var notif = document.getElementById('msgNotif');
    if (badge) badge.classList.remove('active');
    if (notif) notif.classList.remove('active');
    parent.postMessage({ type: 'notifHide' }, '*');
}

function openNotif() {
    dismissNotif();
    openFaqChat();
}

// Show "New message from Queen Karin" 10s after page load
notifTimer = setTimeout(function() { showNotif(); }, 10000);

/* ── GLOBAL OVERLAY ── */
var globalLoaded = false;

function timeAgo(dateStr) {
    var utcStr = (dateStr.endsWith('Z') || dateStr.indexOf('+') > -1) ? dateStr : dateStr + 'Z';
    var diff = Date.now() - new Date(utcStr).getTime();
    var mins = Math.floor(diff / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + 'm ago';
    var hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    var days = Math.floor(hrs / 24);
    return days + 'd ago';
}

function parseActivityCard(msg) {
    var content = msg.message || msg.content || '';
    var created = msg.created_at;
    var avatar = msg.sender_avatar || null;
    var hier = msg.hierarchy || null;
    try {
        if (content.indexOf('RISKY_TRIBUTE_CARD::') === 0) {
            var d = JSON.parse(content.replace('RISKY_TRIBUTE_CARD::', ''));
            return { name: d.senderName || 'SUBJECT', avatar: d.senderAvatar || avatar, hierarchy: hier, kind: 'risky', cardIcon: d.icon || null, cardName: d.cardName || null, isWin: d.isWin, stakeAmount: d.stakeAmount || 0, wonAmount: d.wonAmount || 0, lostAmount: d.lostAmount || 0, time: created };
        }
        if (content.indexOf('DIRECT_TRIBUTE_CARD::') === 0) {
            var d = JSON.parse(content.replace('DIRECT_TRIBUTE_CARD::', ''));
            return { name: d.senderName || 'SUBJECT', avatar: d.senderAvatar || avatar, hierarchy: hier, text: 'sent a tribute of ' + (d.amount||0).toLocaleString() + ' coins', kind: 'tribute', time: created };
        }
        if (content.indexOf('PROMOTION_CARD::') === 0) {
            var d = JSON.parse(content.replace('PROMOTION_CARD::', ''));
            return { name: d.name || 'SUBJECT', avatar: avatar, hierarchy: hier, text: 'was promoted to ' + (d.newRank || 'a new rank'), kind: 'promotion', time: created };
        }
        if (content.indexOf('CHALLENGE_TASK_CARD::') === 0) {
            var d = JSON.parse(content.replace('CHALLENGE_TASK_CARD::', ''));
            return { name: d.senderName || 'SUBJECT', avatar: d.senderAvatar || avatar, hierarchy: hier, text: 'completed a challenge task', kind: 'challenge', time: created };
        }
        if (content.indexOf('WELCOME_CARD::') === 0) {
            var d = JSON.parse(content.replace('WELCOME_CARD::', ''));
            return { name: d.name || 'New Subject', avatar: avatar, hierarchy: hier, text: 'entered the household', kind: 'welcome', time: created };
        }
        if (content.indexOf('UPDATE_MERIT_CARD::') === 0) {
            var d = JSON.parse(content.replace('UPDATE_MERIT_CARD::', ''));
            return { name: d.senderName || 'SUBJECT', avatar: d.senderAvatar || avatar, hierarchy: hier, text: 'earned ' + (d.points || 0) + ' merit points', kind: 'merit', iconEmoji: '⭐', iconLabel: 'MERIT', time: created };
        }
        if (content.indexOf('UPDATE_COINS_CARD::') === 0) {
            var d = JSON.parse(content.replace('UPDATE_COINS_CARD::', ''));
            return { name: d.senderName || 'SUBJECT', avatar: d.senderAvatar || avatar, hierarchy: hier, text: 'claimed ' + (d.points || 0) + ' coins from kneeling', kind: 'coins', iconEmoji: '🪙', iconLabel: 'COINS', time: created };
        }
        if (content.indexOf('CHALLENGE_JOIN_CARD::') === 0) {
            var d = JSON.parse(content.replace('CHALLENGE_JOIN_CARD::', ''));
            return { name: d.senderName || d.name || 'SUBJECT', avatar: d.senderAvatar || avatar, hierarchy: hier, text: 'joined ' + (d.challengeName || 'a challenge'), kind: 'challenge_join', time: created };
        }
    } catch(e) {}
    return null;
}

function loadGlLeaderboard(period, tab) {
    if (tab) {
        document.querySelectorAll('.gl-lb-tab').forEach(function(t) { t.classList.remove('active'); });
        tab.classList.add('active');
    }
    var c = document.getElementById('glLbEntries');
    if (!c) return;
    fetch('/api/global/leaderboard?period=' + period)
        .then(function(r) { return r.json(); })
        .then(function(d) {
            c.innerHTML = '';
            if (!d.entries || d.entries.length === 0) {
                c.innerHTML = '<div class="gl-empty">No scores yet</div>';
                return;
            }
            d.entries.slice(0, 10).forEach(function(e, i) {
                var cls = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : 'minor';
                var av = e.avatar ? 'background-image:url(' + e.avatar + ')' : '';
                c.innerHTML += '<div class="gl-lb-entry ' + cls + '">' +
                    '<div class="gl-lb-rank">' + (i + 1) + '</div>' +
                    '<div class="gl-lb-avatar" style="' + av + '"></div>' +
                    '<div class="gl-lb-info"><div class="gl-lb-name">' + (e.name || 'Anonymous') + '</div><div class="gl-lb-hier">' + (e.hierarchy || '') + '</div></div>' +
                    '<div class="gl-lb-score">' + (e.score ? e.score.toLocaleString() : '0') + '</div>' +
                '</div>';
            });
        }).catch(function() { c.innerHTML = '<div class="gl-empty">Could not load</div>'; });
}

function loadGlActivity() {
    var c = document.getElementById('glActivityFeed');
    if (!c) return;
    fetch('/api/global/messages')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var msgs = data.messages || data;
            c.innerHTML = '';
            if (!Array.isArray(msgs) || msgs.length === 0) {
                c.innerHTML = '<div class="gl-empty">No activity yet</div>';
                return;
            }
            var items = [];
            for (var i = msgs.length - 1; i >= 0 && items.length < 10; i--) {
                var parsed = parseActivityCard(msgs[i]);
                if (parsed) items.push(parsed);
            }
            if (items.length === 0) {
                c.innerHTML = '<div class="gl-empty">No activity yet</div>';
                return;
            }
            items.forEach(function(item) {
                var initial = (item.name || 'S').charAt(0).toUpperCase();
                var when = item.time ? timeAgo(item.time) : '';
                var avHtml = item.avatar
                    ? '<img class="gl-ac-av" src="' + item.avatar + '" onerror="this.outerHTML=\'<div class=gl-ac-av-fallback>' + initial + '</div>\'">'
                    : '<div class="gl-ac-av-fallback">' + initial + '</div>';
                var hierHtml = item.hierarchy ? '<div class="gl-ac-hier">' + item.hierarchy + '</div>' : '';
                var timeHtml = '<div class="gl-ac-time">' + when + '</div>';

                if (item.kind === 'risky' && item.cardIcon) {
                    var resultText = item.isWin
                        ? '<span style="color:#4ade80">won ' + (item.wonAmount||0).toLocaleString() + ' coins</span>'
                        : item.lostAmount === 0
                            ? '<span style="color:#c5a059">lost nothing</span>'
                            : '<span style="color:#ff0000">lost ' + (item.lostAmount||0).toLocaleString() + ' coins</span>';
                    c.innerHTML += '<div class="gl-activity-card"><div class="gl-activity-card-risky">' +
                        timeHtml +
                        '<div class="gl-ac-risky-left"><img src="' + item.cardIcon + '" onerror="this.style.display=\'none\'">' +
                            (item.cardName ? '<span>' + item.cardName + '</span>' : '') +
                        '</div>' +
                        '<div class="gl-ac-risky-right">' +
                            '<div style="display:flex;align-items:center;gap:10px">' + avHtml + '<div><div class="gl-ac-name">' + item.name + '</div>' + hierHtml + '</div></div>' +
                            '<div class="gl-ac-text">gambled ' + (item.stakeAmount||0).toLocaleString() + ' coins</div>' +
                            '<div style="font-family:Cinzel,serif;font-size:0.75rem;font-weight:600;letter-spacing:0.5px">' + resultText + '</div>' +
                        '</div>' +
                    '</div></div>';
                } else if (item.iconEmoji) {
                    c.innerHTML += '<div class="gl-activity-card"><div class="gl-activity-card-risky">' +
                        timeHtml +
                        '<div class="gl-ac-risky-left"><span style="font-size:2rem;line-height:1">' + item.iconEmoji + '</span>' +
                            '<span>' + item.iconLabel + '</span>' +
                        '</div>' +
                        '<div class="gl-ac-risky-right">' +
                            '<div style="display:flex;align-items:center;gap:10px">' + avHtml + '<div><div class="gl-ac-name">' + item.name + '</div>' + hierHtml + '</div></div>' +
                            '<div class="gl-ac-text">' + (item.text || '') + '</div>' +
                        '</div>' +
                    '</div></div>';
                } else {
                    c.innerHTML += '<div class="gl-activity-card gl-activity-card-std">' +
                        timeHtml +
                        '<div class="gl-ac-row">' + avHtml +
                            '<div class="gl-ac-info"><div class="gl-ac-name">' + item.name + '</div>' + hierHtml + '</div>' +
                        '</div>' +
                        '<div class="gl-ac-text">' + (item.text || '') + '</div>' +
                    '</div>';
                }
            });
        }).catch(function() { c.innerHTML = '<div class="gl-empty">Could not load</div>'; });
}

function openGlobal() {
    // Force-close FAQ instantly (no animation) if open
    var faq = document.getElementById('faqChatOverlay');
    if (faq && faq.classList.contains('open')) {
        faq.style.transition = 'none';
        faq.classList.remove('open');
        faq.offsetHeight; // force reflow
        faq.style.transition = '';
    }
    // Dismiss access denied in parent
    parent.postMessage({ type: 'dismissAccessDenied' }, '*');

    var overlay = document.getElementById('globalOverlay');
    if (!overlay) return;
    parent.postMessage({ type: 'faqOpen' }, '*');
    overlay.classList.add('open');
    loadGlLeaderboard('today', null);
    loadGlActivity();
    globalLoaded = true;
}

function closeGlobal() {
    var overlay = document.getElementById('globalOverlay');
    if (!overlay) return;
    overlay.classList.remove('open');
    parent.postMessage({ type: 'faqClose' }, '*');
}

function toggleGlobal() {
    var overlay = document.getElementById('globalOverlay');
    if (!overlay) return;
    if (overlay.classList.contains('open')) { closeGlobal(); return; }
    openGlobal();
}

// Listen for parent messages (e.g. openFaq)
window.addEventListener('message', function(e) {
    if (e.data && e.data.type === 'openFaq') {
        dismissNotif();
        openFaqChat();
    }
});
