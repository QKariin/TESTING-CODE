* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
html, body { background: transparent; overflow: hidden; height: 100%; }

/* SPEECH BUBBLE */
.faq-nav-speech {
    position: absolute; bottom: 72px; left: 50%; transform: translateX(-50%);
    background: rgba(197,160,89,0.12); border: 1px solid rgba(197,160,89,0.25);
    border-radius: 12px 12px 12px 4px; padding: 6px 14px;
    font-family: 'Cormorant Garamond', serif; font-size: 0.8rem;
    color: rgba(255,255,255,0.6); font-style: italic; white-space: nowrap;
    animation: faqSpeechFloat 3s ease-in-out infinite;
    pointer-events: none;
}
.faq-nav-speech::after {
    content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 6px solid transparent; border-right: 6px solid transparent;
    border-top: 6px solid rgba(197,160,89,0.25);
}
@keyframes faqSpeechFloat {
    0%,100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(-4px); }
}

/* FAQ CHAT OVERLAY */

    display: flex; flex-direction: column;
    transform: translateY(100%);
    visibility: hidden;
    transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1), visibility 0.35s;
}
.faq-chat-overlay.open { transform: translateY(0); visibility: visible; }
.faq-chat-header {
    flex-shrink: 0; display: flex; align-items: center; justify-content: space-between;

    border-top: 3px solid rgba(197,160,89,0.55);

}
.faq-chat-header-left { display: flex; align-items: center; gap: 10px; }
.faq-chat-header-av-wrap { position: relative; width: 52px; height: 52px; }
.faq-chat-header-av {

    border: 1.5px solid rgba(197,160,89,0.5);
}
.faq-chat-online-dot {
    position: absolute; bottom: 1px; right: 1px; width: 10px; height: 10px;
    background: #4ade80; border-radius: 50%; border: 2px solid #020512;
}
.faq-chat-header-info { display: flex; flex-direction: column; }
.faq-chat-header-name {
    font-family: 'Cinzel', serif; font-size: 0.85rem;
    color: #c5a059; letter-spacing: 3px; font-weight: bold; line-height: 1;
}
.faq-chat-header-status {
    font-family: 'Orbitron', sans-serif; font-size: 0.28rem;
    color: #4ade80; letter-spacing: 2px; margin-top: 4px;
    display: flex; align-items: center; gap: 4px;
}
.faq-chat-header-status::before {
    content: ''; width: 5px; height: 5px; background: #4ade80;
    border-radius: 50%; flex-shrink: 0;
}
.faq-chat-close {
    background: none; border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.4); width: 32px; height: 32px;
    border-radius: 50%; font-size: 0.8rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
}
.faq-chat-body {
    flex: 1; overflow-y: auto; padding: 20px 12px;
    display: flex; flex-direction: column; gap: 6px;
    -webkit-overflow-scrolling: touch;
}
.faq-chat-body::-webkit-scrollbar { display: none; }
.faq-cb-row { display: flex; align-items: flex-end; gap: 6px; padding: 0 4px;

}
.faq-cb-row-queen { justify-content: flex-start; }

.faq-cb-av {

    align-self: flex-end; margin-bottom: 20px;
}
.faq-cb-wrap-queen { display: flex; flex-direction: column; align-items: flex-start; max-width: 80%; }
.faq-cb-wrap-user { display: flex; flex-direction: column; align-items: flex-end; max-width: 80%; }
.faq-cb-queen {

}
.faq-cb-user {

}

.faq-cat-chips {
    display: flex; flex-direction: column; align-items: center;

.faq-q-wrap {
    display: flex; flex-direction: column; align-items: center;
    gap: 0; padding: 4px 0;
}
.faq-q-bubble {

.faq-a-bubble {

.faq-typing-row { display: flex; align-items: flex-end; gap: 6px; padding: 0 4px;

.faq-typing-bubble {

.faq-typing-dot {

.faq-typing-dot:nth-child(2) { animation-delay: 0.15s; }

.faq-chat-ts {

.faq-chat-ts-queen { color: rgba(197,160,89,0.35); text-align: left; }
.faq-chat-ts-user { text-align: right; }
.faq-chat-actions {

.faq-close-btn {

.faq-keep-asking-wrap {
    display: flex; flex-direction: column; align-items: center;
    gap: 10px; margin-top: 18px;
    position: relative; z-index: 2;
    animation: faqFadeIn 0.5s ease forwards;

.faq-change-topic-btn {
    background: transparent; border-color: rgba(197,160,89,0.15);

.faq-keep-asking-btn {

}
.faq-keep-asking-btn:hover {
    background: rgba(197,160,89,0.15); border-color: rgba(197,160,89,0.55);

@keyframes faqBubbleIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes faqSlideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes faqTypingBounce {

    30% { transform: translateY(-6px); opacity: 1; }
}
@keyframes faqQFadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes faqFadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.fake-nav-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

            { q: "I'm nervous to join.", a: '<p>Good. You should be. That means you\'re taking it seriously. Every subject who ever knelt for me was nervous the first time. The difference between you and them is they did it anyway.</p>' },
            { q: 'Do I need experience?', a: '<p>None. Most of my subjects started with nothing but curiosity. You don\'t need to know the terminology, the protocols, or the "right way" to submit. I\'ll teach you. The only thing I need from you is honesty about where you are and willingness to learn.</p>' },
            { q: 'What do you expect from me?', a: '<p>Honesty and consistency. That\'s all. I don\'t care how experienced you are, how much money you have, or how submissive you think you are. I care if you show up when you say you will. I care if you do what I assign you. I care if you tell me the truth even when it\'s uncomfortable. Everything else I can work with. But if you lie to me or waste my time, you won\'t last here.</p>' },
            { q: 'What if I fail?', a: '<p>You will. Everyone does. I don\'t expect perfection, I expect you to get back up. Missing a task, slipping on your routine, falling behind on kneeling. That happens. What matters is what you do after. The subjects who grow here aren\'t the ones who never fail. They\'re the ones who fail and come back the next day anyway.</p>' },
            { q: "I don't know what kind of submissive I am.", a: '<p>That\'s fine. Most don\'t when they start. You don\'t need to show up with a label. Some discover they\'re into keyholding. Some find out they need total ownership. Some just want structure and accountability. You\'ll figure it out here. I\'ve seen every type and I know how to read what you need before you do. Just walk in honest and the rest will come.</p>' },
        ]
    }
];

var pickupLines = [
    'Glad you asked.', 'Good question.', 'I get this one a lot.',
    'Let me be direct.', 'Fair question.', "I'll tell you exactly how it is.",
    'Most are afraid to ask this.', "You're smart to ask.", 'Honest answer?',
    "Here's the truth.", 'I respect the curiosity.', 'No sugarcoating.',
    'Straight answer.', 'Since you asked nicely.', "That's worth answering.",
    "I'll give you the real answer.", 'You should know this.',
    'Important question.', 'Let me break it down.', 'Pay attention.'
];

var pickupIndex = 0;
var catFirstAnswer = {};
var askedQuestions = {};

function getNextPickup() {
    var line = pickupLines[pickupIndex % pickupLines.length];
    pickupIndex++;
    return line;
}

function getFaqTime() {
    var now = new Date();
    var h = now.getHours(); var m = now.getMinutes();
    return (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m;
}

function scrollFaqChat() {
    var body = document.getElementById('faqChatBody');
    if (!body) return;
    setTimeout(function() { body.scrollTo({ top: body.scrollHeight, behavior: 'smooth' }); }, 50);
}

function showTypingIndicator() {
    var body = document.getElementById('faqChatBody');
    if (!body) return;
    var row = document.createElement('div');
    row.className = 'faq-typing-row';
    row.id = 'faqTyping';
    row.innerHTML = '<img src="/queen-nav.png" class="faq-cb-av">' +
        '<div class="faq-typing-bubble"><div class="faq-typing-dot"></div><div class="faq-typing-dot"></div><div class="faq-typing-dot"></div></div>';
    body.appendChild(row);
    scrollFaqChat();
}

function removeTypingIndicator() {
    var el = document.getElementById('faqTyping');
    if (el) el.remove();
}

function addQueenBubble(text) {
    removeTypingIndicator();
    var body = document.getElementById('faqChatBody');
    if (!body) return;
    var row = document.createElement('div');
    row.className = 'faq-cb-row faq-cb-row-queen';
    row.innerHTML = '<img src="/queen-nav.png" class="faq-cb-av">' +
        '<div class="faq-cb-wrap-queen"><div class="faq-cb-queen">' + text + '</div>' +
        '<div class="faq-chat-ts faq-chat-ts-queen">' + getFaqTime() + '</div></div>';
    body.appendChild(row);
    scrollFaqChat();
}

function addUserBubble(text) {
    var body = document.getElementById('faqChatBody');
    if (!body) return;
    var row = document.createElement('div');
    row.className = 'faq-cb-row faq-cb-row-user';
    row.innerHTML = '<div class="faq-cb-wrap-user"><div class="faq-cb-user">' + text + '</div>' +
        '<div class="faq-chat-ts faq-chat-ts-user">' + getFaqTime() + '</div></div>';
    body.appendChild(row);
    scrollFaqChat();
}

function addChatActions() {
    var body = document.getElementById('faqChatBody');
    if (!body) return;
    var actions = document.createElement('div');
    actions.className = 'faq-chat-actions';
    var close = document.createElement('button');
    close.className = 'faq-close-btn';
    close.textContent = 'CLOSE';
    close.onclick = function() { closeFaqChat(); };
    actions.appendChild(close);
    body.appendChild(actions);
}

function addChangeTopic() {
    var body = document.getElementById('faqChatBody');
    if (!body) return;
    var wrap = document.createElement('div');
    wrap.className = 'faq-keep-asking-wrap';
    var btn = document.createElement('button');
    btn.className = 'faq-keep-asking-btn faq-change-topic-btn';
    btn.textContent = 'CHANGE TOPIC';
    btn.onclick = function() {
        var oldActions = body.querySelectorAll('.faq-chat-actions');
        oldActions.forEach(function(a) { a.remove(); });
        wrap.remove();
        goBackToCategories();
    };
    wrap.appendChild(btn);
    body.appendChild(wrap);
}

function showCategoryChips(excludeCat) {
    var body = document.getElementById('faqChatBody');
    if (!body) return;
    var delay = 0;
    for (var i = 0; i < faqData.length; i++) {
        if (i === excludeCat) continue;
        (function(idx, d) {
            setTimeout(function() {
                var wrap = document.createElement('div');
                wrap.className = 'faq-cat-chips';
                var chip = document.createElement('button');
                chip.className = 'faq-cat-chip';
                chip.innerHTML = faqData[idx].icon + ' ' + faqData[idx].title;
                chip.setAttribute('data-cat', idx);
                chip.onclick = function() { selectCategory(parseInt(this.getAttribute('data-cat'))); };
                wrap.appendChild(chip);
                body.appendChild(wrap);
                scrollFaqChat();
            }, d * 350);
        })(i, delay);
        delay++;
    }
}

function selectCategory(index) {
    var chips = document.querySelectorAll('.faq-cat-chips');
    chips.forEach(function(c) { c.remove(); });
    // Remove close button that was with categories
    var oldActions = document.querySelectorAll('.faq-chat-actions');
    oldActions.forEach(function(a) { a.remove(); });
    addUserBubble(faqData[index].title);
    var questions = faqData[index].questions;
    setTimeout(function() {
        showTypingIndicator();
        setTimeout(function() {
            addQueenBubble('Here are some common questions:');
            setTimeout(function() { showQuestionBubbles(index, questions); }, 400);
        }, 1000);
    }, 300);
}

function showQuestionBubbles(catIndex, questions) {
    var body = document.getElementById('faqChatBody');
    if (!body) return;
    var delay = 0;
    for (var i = 0; i < questions.length; i++) {
        (function(idx) {
            setTimeout(function() {
                var wrap = document.createElement('div');
                wrap.className = 'faq-q-wrap';
                var bubble = document.createElement('div');
                bubble.className = 'faq-q-bubble';
                bubble.textContent = questions[idx].q;
                bubble.setAttribute('data-cat', catIndex);
                bubble.setAttribute('data-q', idx);
                bubble.onclick = function() {
                    selectQuestion(parseInt(this.getAttribute('data-cat')), parseInt(this.getAttribute('data-q')));
                };
                wrap.appendChild(bubble);
                body.appendChild(wrap);
                scrollFaqChat();
                if (idx === questions.length - 1) {
                    setTimeout(function() { addChatActions(); scrollFaqChat(); }, 200);
                }
            }, delay);
        })(i);
        delay += 350;
    }
}

function selectQuestion(catIndex, qIndex) {
    var cat = faqData[catIndex];
    var item = cat.questions[qIndex];
    if (!askedQuestions[catIndex]) askedQuestions[catIndex] = [];
    if (askedQuestions[catIndex].indexOf(qIndex) === -1) askedQuestions[catIndex].push(qIndex);
    // Remove old actions and keep-asking wraps
    var oldActions = document.querySelectorAll('.faq-chat-actions');
    oldActions.forEach(function(a) { a.remove(); });
    var oldKeep = document.querySelectorAll('.faq-keep-asking-wrap');
    oldKeep.forEach(function(k) { k.remove(); });
    addUserBubble(item.q);
    var pickupHtml = '';
    if (!catFirstAnswer[catIndex]) {
        catFirstAnswer[catIndex] = true;
        pickupHtml = '<p style="color:#c5a059;margin:0 0 8px;font-family:Cinzel,serif;font-size:0.85rem;font-weight:600">' + getNextPickup() + '</p>';
    }
    setTimeout(function() { showTypingIndicator(); }, 300);
    setTimeout(function() {
        removeTypingIndicator();
        var body = document.getElementById('faqChatBody');
        if (!body) return;
        var row = document.createElement('div');
        row.className = 'faq-cb-row faq-cb-row-queen';
        row.innerHTML = '<img src="/queen-nav.png" class="faq-cb-av">' +
            '<div class="faq-cb-wrap-queen"><div class="faq-a-bubble">' + pickupHtml + item.a + '</div>' +
            '<div class="faq-chat-ts faq-chat-ts-queen">' + getFaqTime() + '</div></div>';
        body.appendChild(row);
        var asked = askedQuestions[catIndex] || [];
        var remaining = [];
        for (var i = 0; i < cat.questions.length; i++) {
            if (asked.indexOf(i) === -1) remaining.push(i);
        }
        if (remaining.length > 0) {
            setTimeout(function() {
                var keepWrap = document.createElement('div');
                keepWrap.className = 'faq-keep-asking-wrap';
                var keepBtn = document.createElement('button');
                keepBtn.className = 'faq-keep-asking-btn';
                keepBtn.textContent = 'KEEP ASKING';
                keepBtn.onclick = function() {
                    var oldActions = body.querySelectorAll('.faq-chat-actions');
                    oldActions.forEach(function(a) { a.style.opacity = '0'; a.style.transition = 'opacity 0.3s'; });
                    keepWrap.style.opacity = '0';
                    keepWrap.style.transition = 'opacity 0.3s';
                    setTimeout(function() {
                        oldActions.forEach(function(a) { a.remove(); });
                        keepWrap.remove();
                        showTypingIndicator();
                        setTimeout(function() {
                            removeTypingIndicator();
                            addQueenBubble('Sure, here you go:');
                            setTimeout(function() {
                                remaining.forEach(function(ri, idx) {
                                    setTimeout(function() {
                                        var wrap = document.createElement('div');
                                        wrap.className = 'faq-q-wrap';
                                        var b = document.createElement('div');
                                        b.className = 'faq-q-bubble';
                                        b.textContent = cat.questions[ri].q;
                                        b.setAttribute('data-cat', catIndex);
                                        b.setAttribute('data-q', ri);
                                        b.onclick = function() {
                                            selectQuestion(parseInt(this.getAttribute('data-cat')), parseInt(this.getAttribute('data-q')));
                                        };
                                        wrap.appendChild(b);
                                        body.appendChild(wrap);
                                        scrollFaqChat();
                                        if (idx === remaining.length - 1) {
                                            setTimeout(function() { addChangeTopic(); addChatActions(); scrollFaqChat(); }, 200);
                                        }
                                    }, idx * 350);
                                });
                            }, 400);
                        }, 900);
                    }, 300);
                };
                keepWrap.appendChild(keepBtn);
                body.appendChild(keepWrap);
                addChatActions();
                scrollFaqChat();
            }, 400);
        } else {
            // All questions in this category asked — show other categories
            setTimeout(function() {
                showTypingIndicator();
                setTimeout(function() {
                    addQueenBubble('You\'ve covered everything here. Want to explore another topic?');
                    setTimeout(function() { showCategoryChips(catIndex); setTimeout(function() { addChatActions(); scrollFaqChat(); }, faqData.length * 350 + 200); }, 400);
                }, 900);
            }, 400);
        }
        scrollFaqChat();
    }, 1500);
}

function goBackToCategories() {
    showTypingIndicator();
    setTimeout(function() {
        addQueenBubble('What else would you like to know?');
        setTimeout(function() {
            showCategoryChips();
            setTimeout(function() { addChatActions(); scrollFaqChat(); }, faqData.length * 350 + 200);
        }, 400);
    }, 1000);
}

/* ── OPEN / CLOSE / TOGGLE ── */
function openFaqChat() {
    var overlay = document.getElementById('faqChatOverlay');
    var body = document.getElementById('faqChatBody');
    var speech = document.querySelector('.faq-nav-speech');
    if (!overlay || !body) return;
    if (speech) speech.style.display = 'none';
    body.innerHTML = '';
    // Tell parent to expand iframe
    parent.postMessage({ type: 'faqOpen' }, '*');
    // Wait for iframe resize, then animate
    setTimeout(function() {
        overlay.classList.add('open');
        setTimeout(function() { showTypingIndicator(); }, 200);
        setTimeout(function() { addQueenBubble('What would you like to know?'); }, 1200);
        setTimeout(function() {
            showCategoryChips();
            setTimeout(function() { addChatActions(); scrollFaqChat(); }, faqData.length * 350 + 200);
        }, 1600);
    }, 60);
}

function closeFaqChat() {
    var overlay = document.getElementById('faqChatOverlay');
    if (!overlay) return;
    overlay.classList.remove('open');
    var speech = document.querySelector('.faq-nav-speech');
    if (speech) speech.style.display = '';
    // Tell parent to shrink iframe after animation
    parent.postMessage({ type: 'faqClose' }, '*');
}

function toggleFaqChat() {
    var overlay = document.getElementById('faqChatOverlay');
    if (!overlay) return;
    if (overlay.classList.contains('open')) { closeFaqChat(); return; }
    openFaqChat();
}

/* ── NAV CLICK HANDLERS ── */
function handleNavClick(section) {
    // Close FAQ if open
    var overlay = document.getElementById('faqChatOverlay');
    if (overlay && overlay.classList.contains('open')) {
        closeFaqChat();
    }
    // Tell parent to show access denied
    parent.postMessage({ type: 'navClick', section: section }, '*');
}

function handleCenterClick() {
    // Dismiss access denied in parent
    parent.postMessage({ type: 'dismissAccessDenied' }, '*');
    // Toggle FAQ
    toggleFaqChat();
}
</script>
</body>
</html>
